<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Tree edges -->
  <line x1="32" y1="17" x2="17" y2="34" stroke="white" stroke-width="1.8" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="32" y1="17" x2="47" y2="34" stroke="white" stroke-width="1.8" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="17" y1="34" x2="10" y2="50" stroke="white" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="17" y1="34" x2="24" y2="50" stroke="white" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="47" y1="34" x2="40" y2="50" stroke="white" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="47" y1="34" x2="54" y2="50" stroke="white" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- Level 2 nodes -->
  <circle cx="10" cy="50" r="4" fill="white" fill-opacity="0.45"/>
  <circle cx="24" cy="50" r="4" fill="white" fill-opacity="0.45"/>
  <circle cx="40" cy="50" r="4" fill="white" fill-opacity="0.45"/>
  <circle cx="54" cy="50" r="4" fill="white" fill-opacity="0.45"/>

  <!-- Level 1 nodes -->
  <circle cx="17" cy="34" r="6" fill="white" fill-opacity="0.75"/>
  <circle cx="47" cy="34" r="6" fill="white" fill-opacity="0.75"/>

  <!-- Root node — highlighted -->
  <circle cx="32" cy="17" r="8" fill="white" filter="url(#glow)"/>
  <circle cx="32" cy="17" r="5" fill="#0ea5e9"/>
</svg>
